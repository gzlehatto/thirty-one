let resultMatchOver=false,roundSummary=null;
function launchConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  canvas.style.display='block';
  const colors=['#f1c40f','#2ecc71','#e74c3c','#3498db','#e67e22','#9b59b6','#ffffff','#5fffab','#ff6b6b','#ffd700'];
  const pieces=Array.from({length:180},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height-canvas.height,
    w:Math.random()*12+5, h:Math.random()*7+4,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-0.5)*0.18,
    vx:(Math.random()-0.5)*4,
    vy:Math.random()*5+2
  }));
  const start=Date.now();let raf;
  (function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t=(Date.now()-start)/1000;
    const alpha=t>3?Math.max(0,1-(t-3)/1.5):1;
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotSpeed;
      if(p.y>canvas.height){p.y=-p.h;p.x=Math.random()*canvas.width;}
      ctx.save();ctx.globalAlpha=alpha;
      ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(t<4.5){raf=requestAnimationFrame(animate);}
    else{canvas.style.display='none';ctx.clearRect(0,0,canvas.width,canvas.height);}
  })();
}

function koLine(scoreMap){
  const ko=scoreMap.filter(x=>x.player.lives===0);
  if(!ko.length)return'';
  if(ko.length===1&&ko[0].player.isHuman)return'\nAND YOU\'RE OUT!';
  const names=ko.map(x=>x.player.isHuman?'YOU':x.player.name).join(' & ');
  return'\n'+(ko.length>1?names+' ARE OUT!':names+' IS OUT!');
}
// Returns true if the local player is the one who should trigger the next deal.
// That's the next dealer if they're a human MP player, otherwise the host.
function mpIsInControl(){
  if(!isMultiplayer)return true;
  const ndi=nextActive(dealerIdx);
  const nd=players[ndi];
  if(!nd||!nd.playerId)return mpIsHost; // bot dealer → host controls
  return nd.playerId===mpPlayerId;
}

function showResult(title,detail,scoresLine,matchOver){
  resultMatchOver=matchOver;
  roundSummary={title,detail,scoresLine,matchOver};
  if(isMultiplayer&&mpIsHost){
    setTimeout(pushState,60);
  }
  const po=document.getElementById('pilesOverlay');
  const tc=document.getElementById('tableCenter');
  document.getElementById('poHeader').textContent=title;
  document.getElementById('poCardWrap').innerHTML='';
  const det=document.getElementById('poDetail');
  if(det){det.innerHTML=''+(detail?detail:'')+(scoresLine?'<span class="scores-line">'+scoresLine+'</span>':'');}
  const sub=document.getElementById('poSub');
  if(isMultiplayer&&matchOver){
    if(mpIsHost){
      sub.innerHTML='<button class="mp-action-btn" style="margin-top:16px;" onclick="mpPlayAgain()">Play Again 🔄</button><br><span class="po-tap" style="opacity:0.25">or tap anywhere to exit</span>';
    } else {
      sub.innerHTML='<div style="opacity:0.5;font-size:0.85rem;margin-top:14px;">Waiting for host to start again...</div><br><span class="po-tap" style="opacity:0.25">or tap anywhere to exit</span>';
    }
  } else if(!isMultiplayer||mpIsInControl()){
    const ndi=nextActive(dealerIdx);const nd=players[ndi];
    const dealerLabel=isMultiplayer&&nd&&!nd.isHuman===false&&nd.playerId===mpPlayerId?'You deal next — ':
                      isMultiplayer&&nd?nd.name+' deals next — ':'';
    sub.innerHTML='<span class="po-tap">'+(isMultiplayer?dealerLabel:'')+'Tap to continue</span>';
  } else {
    const ndi=nextActive(dealerIdx);const nd=players[ndi];
    const dealerName=nd?nd.name:'the dealer';
    sub.innerHTML='<div style="opacity:0.6;font-size:0.85rem;margin-top:14px;">Waiting for '+dealerName+' to deal...</div>';
  }
  tc.classList.remove('tc-draw-deck','tc-draw-discard','tc-discarded');
  clearTimeout(po._dt);
  po.className='visible result';
}

function closeRoundResult(){
  dismissPilesOverlay();
  document.getElementById('poSub').innerHTML='';
  const detEl=document.getElementById('poDetail');if(detEl)detEl.innerHTML='';
  const mo=resultMatchOver;resultMatchOver=false;
  if(mo){if(isMultiplayer)leaveLobby();else showSetup();return;}
  if(isMultiplayer&&!mpIsInControl()){
    // Not our turn to deal — just close overlay and wait for dealer's push
    setStatus('Waiting for '+(players[nextActive(dealerIdx)]?.name||'dealer')+' to deal...');
    return;
  }
  dealerIdx=nextActive(dealerIdx);if(activePlayers().length<=1){showSetup();return;}startNewRound();
  if(isMultiplayer)setTimeout(pushState,300);
}

// ── Layout engine: side panel vs bottom dock ──
function isSidePanel(){ return window.innerWidth>=700; }

function syncDockHeight(){
  const dock=document.getElementById('controlDock');
  if(!dock||dock.hasAttribute('hidden'))return;
  if(isSidePanel()){
    // Side panel: full height on right, game area gets full viewport height
    const dockW=Math.ceil(dock.getBoundingClientRect().width)||242;
    document.body.style.paddingBottom='12px';
    document.body.style.paddingRight=(dockW+4)+'px';
    document.documentElement.style.setProperty('--dock-h','60px');
  } else {
    // Bottom dock: set body padding to match dock height
    const h=Math.ceil(dock.getBoundingClientRect().height);
    document.body.style.paddingRight='12px';
    document.body.style.paddingBottom=h+'px';
    document.documentElement.style.setProperty('--dock-h',(h+8)+'px');
  }
  fitTableToViewport();
}

function fitTableToViewport(){
  const tableArea=document.getElementById('tableArea');
  const gameScreen=document.getElementById('gameScreen');
  if(!tableArea||!gameScreen||gameScreen.style.display==='none')return;
  tableArea.style.zoom='1';
  const h1=gameScreen.querySelector('h1');
  const h1H=h1?h1.getBoundingClientRect().height+parseInt(getComputedStyle(h1).marginBottom||'10'):0;
  const topPad=12;
  let availH;
  if(isSidePanel()){
    // Full viewport height available (no bottom dock eating space)
    availH=window.innerHeight-h1H-topPad-8;
  } else {
    const dock=document.getElementById('controlDock');
    const dockH=dock&&!dock.hasAttribute('hidden')?Math.ceil(dock.getBoundingClientRect().height):0;
    availH=window.innerHeight-dockH-h1H-topPad-6;
  }
  const tableH=tableArea.scrollHeight;
  if(tableH>availH){
    const zoom=Math.max(0.62, availH/tableH);
    tableArea.style.zoom=zoom.toFixed(3);
  }
}

// ── CREATE ROOM ──
async function mpCreateRoom(){
  const name=document.getElementById('mpNameInput').value.trim();
  if(!name){mpSetStatus('Enter your name first!','error');mpShakeInput('mpNameInput');return;}
  mpPlayerName=name;mpIsHost=true;mpCanonicalSeat=0;
  const btn=document.getElementById('mpCreateBtn');btn.disabled=true;btn.textContent='Creating...';
  const fail=(msg)=>{btn.disabled=false;btn.textContent='Create Room 🎮';mpSetStatus(msg,'error');};
  try{
    let db;try{db=getDB();}catch(e){fail('Could not connect — try refreshing the page.');return;}
    let code,tries=0;
    while(tries++<20){
      code=String(1000+Math.floor(Math.random()*9000));
      const snap=await db.collection('rooms').where('code','==',code).where('status','==','waiting').limit(1).get();
      if(snap.empty)break;
    }
    const roomRef=await db.collection('rooms').add({code,hostId:mpPlayerId,status:'waiting',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    mpRoomId=roomRef.id;mpRoomCode=code;isMultiplayer=true;
    btn.disabled=false;btn.textContent='Create Room 🎮';
    await db.collection('rooms').doc(mpRoomId).collection('players').doc(mpPlayerId).set({displayName:name,seat:0,isBot:false});
    showWaitingRoom();subscribeRoom();
  }catch(e){fail('Something went wrong — please try again.');console.error('mpCreateRoom:',e);}
}

// ── JOIN ROOM ──
async function mpJoinRoom(){
  const name=document.getElementById('mpNameInput').value.trim();
  const code=document.getElementById('mpCodeInput').value.trim().replace(/\D/g,'');
  if(!name){mpSetStatus('Enter your name!','error');mpShakeInput('mpNameInput');return;}
  if(code.length!==4){mpSetStatus('Enter the 4-digit room code!','error');mpShakeInput('mpCodeInput');return;}
  mpPlayerName=name;mpIsHost=false;
  const btn=document.getElementById('mpJoinBtn');btn.disabled=true;btn.textContent='Joining...';
  const fail=(msg)=>{btn.disabled=false;btn.textContent='Join Room →';mpSetStatus(msg,'error');};
  try{
    let db;try{db=getDB();}catch(e){fail('Could not connect — try refreshing the page.');return;}
    const to=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000));
    let snap;
    try{snap=await Promise.race([db.collection('rooms').where('code','==',code).where('status','==','waiting').limit(1).get(),to]);}
    catch(e){fail(e.message==='timeout'?'Connection timed out — check your internet and try again.':'Connection error — check your internet and try again.');return;}
    if(snap.empty){fail('Room not found or game already started!');return;}
    const roomDoc=snap.docs[0];
    mpRoomId=roomDoc.id;mpRoomCode=code;isMultiplayer=true;
    const playersSnap=await db.collection('rooms').doc(mpRoomId).collection('players').get();
    const taken=new Set(playersSnap.docs.map(d=>d.data().seat));
    let seat=0;while(taken.has(seat))seat++;
    mpCanonicalSeat=seat;
    await db.collection('rooms').doc(mpRoomId).collection('players').doc(mpPlayerId).set({displayName:name,seat,isBot:false});
    showWaitingRoom();subscribeRoom();
  }catch(e){fail('Something went wrong — please try again.');console.error('mpJoinRoom:',e);}
}

// ── REALTIME SUBSCRIPTION ──
let _mpPollInterval=null;
function _startMpPoll(){
  clearInterval(_mpPollInterval);
  _mpPollInterval=setInterval(()=>{if(isMultiplayer&&mpRoomId)fetchLatestState();},2000);
}

function subscribeRoom(){
  const db=getDB();
  const unsubPlayers=db.collection('rooms').doc(mpRoomId).collection('players')
    .onSnapshot(()=>refreshLobbyList(),e=>console.warn('players snapshot error:',e));
  const unsubState=db.collection('rooms').doc(mpRoomId).collection('gameState').doc('current')
    .onSnapshot(
      snap=>{
        if(!snap.exists)return;
        const data=snap.data();
        if(data&&data.pushedBy!==mpPlayerId)onStateReceived(data);
      },
      e=>console.warn('gameState snapshot error:',e)
    );

  if(!mpIsHost)fetchLatestState();

async function fetchLatestState(){

    const snap=await getDB().collection('rooms').doc(mpRoomId).collection('gameState').doc('current').get({source:'server'});
    if(snap.exists){const data=snap.data();if(data&&data.pushedBy!==mpPlayerId)onStateReceived(data);}
  }catch(e){console.warn('fetchLatestState:',e);}

// ── STATE PUSH ──
async function pushState(){
  if(!isMultiplayer)return;
  const local=captureState();
  const canonical=mpCanonicalSeat===0?local:unrotateState(local,mpCanonicalSeat,local.players.length);
  mpPushSeq++;
  const payload={...canonical,pushedBy:mpPlayerId,pushSeq:mpPushSeq};
  try{
    await getDB().collection('rooms').doc(mpRoomId).collection('gameState').doc('current').set(payload);
  }catch(e){console.error('pushState:',e);}
}

// ── STATE RECEIVE ──
function onStateReceived(canonical){
  if(!isMultiplayer)return;
  if(canonical.pushedBy===mpPlayerId)return;  // our own echo
  // Reject stale duplicate deliveries (broadcast arrives fast; postgres_changes can
  // re-deliver the same — or an older — push seconds later via the DB listener)
  const sender=canonical.pushedBy;
  const seq=canonical.pushSeq||0;
  if(seq&&seq<=(mpSeenSeqs[sender]||0))return;  // already applied a newer push from this sender
  if(seq)mpSeenSeqs[sender]=seq;
  const local=mpCanonicalSeat===0?canonical:rotateState(canonical,mpCanonicalSeat,canonical.players?.length||2);
  const wasActive=gameActive;
  const hadSummary=!!roundSummary;
  const prevKnockedByIdx=knockedByIdx;  // capture BEFORE applyState so we can detect new knocks
  applyState(local);

  if(document.getElementById('lobbyScreen').style.display!=='none'){showMpGameScreen();}
  // New round starting — dismiss any result overlay and re-render fresh
  if(local.gameActive&&!wasActive){
    dismissPilesOverlay();
    document.getElementById('mpResultDiv')?.remove();
    document.getElementById('poSub').innerHTML='';
    mpRevealState='idle';mpPendingResult=null;
    syncKnockIndicator();
    renderAll();updateTurnUI();return;
  }
  // Round just ended OR summary just arrived — show showdown overlay
  const roundJustEnded=!local.gameActive&&wasActive;
  const summaryJustArrived=!local.gameActive&&!hadSummary&&!!local.roundSummary;

  if(roundJustEnded||summaryJustArrived){
    if(mpIsHost){
      if(local.roundSummary){
        // Shouldn't normally happen (host computes its own summary), but handle gracefully
        renderAll(true);renderAllLives();
        setTurnBanner('hidden','');setPileInteractive(false);setKnockBtn(false);
        const rs=local.roundSummary;
        showResult(rs.title,rs.detail,rs.scoresLine,rs.matchOver);
      } else {
        // Non-host signaled round over (gameActive=false, no summary) — host runs endRound
        endRound();
      }
    } else {
      // ── NON-HOST REVEAL STATE MACHINE ──
      // Helper: build scoreMap from current local player state
      const buildLocalScoreMap=()=>players.map((p,i)=>({idx:i,player:p,score:p.hand.length>0?handScore(p.hand):null})).filter(x=>x.score!==null);
      // Helper: actually display the result overlay once reveal is done
      const showFinalResult=(rs)=>{renderAll(true);renderAllLives();showResult(rs.title,rs.detail,rs.scoresLine,rs.matchOver);};

      if(roundJustEnded&&!local.roundSummary){
        // Push #1: round just ended, no summary yet — start reveal NOW with current hands
        setTurnBanner('hidden','');setPileInteractive(false);setKnockBtn(false);
        if(local.wasKnockedOffDeal){
          const knockerIdx=activeIdx;
          const kname=knockerIdx===0?'You':players[knockerIdx]?.name??'Opponent';
          showKnockSplash(knockerIdx===0?'You knocked!':kname+' KNOCKS!','Off the deal — round ends now!');
        }
        if(mpRevealState==='idle'){
          mpRevealState='revealing';
          renderAll();
          const sm=buildLocalScoreMap();
          const has31p1=sm.some(x=>x.score===31);
          if(has31p1){
            SFX.win31();renderAll(true);
            setTimeout(()=>{flashResultGlows(sm);setTimeout(()=>{mpRevealState='done';if(mpPendingResult){const r=mpPendingResult;mpPendingResult=null;showFinalResult(r);}else setStatus('Round over — waiting for results…');},1400);},600);
          } else {
            startShowdown(sm,()=>{
              mpRevealState='done';
              if(mpPendingResult){const rs=mpPendingResult;mpPendingResult=null;showFinalResult(rs);}
              else setStatus('Round over — waiting for results…');
            });
          }
        }
      } else if(local.roundSummary){
        // Push #2: summary arrived — route based on reveal progress
        const rs=local.roundSummary;
        resultMatchOver=rs.matchOver;roundSummary=rs;
        if(mpRevealState==='revealing'){
          // Reveal already playing — queue result for when it finishes
          mpPendingResult=rs;
        } else if(mpRevealState==='done'){
          // Reveal already finished — show result immediately
          showFinalResult(rs);
        } else {
          // Missed push #1 — start reveal now
          mpRevealState='revealing';
          setTurnBanner('hidden','');setPileInteractive(false);setKnockBtn(false);
          renderAll();
          const sm=buildLocalScoreMap();
          const has31p2=sm.some(x=>x.score===31);
          if(has31p2){
            SFX.win31();renderAll(true);
            setTimeout(()=>{flashResultGlows(sm);setTimeout(()=>{mpRevealState='done';showFinalResult(rs);},1400);},600);
          } else {
            startShowdown(sm,()=>{mpRevealState='done';showFinalResult(rs);});
          }
        }
      }
    }
    return;
  }
  // Mid-round: detect a new knock and show the splash to this player
  if(knockedByIdx!==null&&prevKnockedByIdx===null){
    const kp=players[knockedByIdx];
    const kname=knockedByIdx===0?'You':kp?.name??'Opponent';
    showKnockSplash(knockedByIdx===0?'You knocked!':kname+' KNOCKS!',
      lastTurnQueue.length>0?'Everyone gets one last turn...':'Round over!');
  }
  // Sync knock indicator with current state
  syncKnockIndicator();
  renderAll();
  updateTurnUI();
}

// ── CAPTURE / APPLY ──
function captureState(){
  return{v:1,deck:[...deck],discardPile:[...discardPile],
    players:players.map(p=>({...p,hand:[...p.hand]})),
    activeIdx,turnPhase,knockedByIdx,mustDrawIdx,lastTurnQueue:[...lastTurnQueue],
    isFirstAction,gameActive,roundCount,dealerIdx,wasKnockedOffDeal,
    houseRuleKnockLow,houseRuleTripleAces,houseRuleFreeRide,
    inferredSuits:{...inferredSuits},lastDrawSource,lastDrawnIdx,
    roundSummary:roundSummary??null};
}
function applyState(s){
  deck=s.deck??[];discardPile=s.discardPile??[];
  players=(s.players??[]).map(p=>({...p,hand:[...(p.hand||[])]}));
  numPlayers=players.length;
  activeIdx=s.activeIdx??0;turnPhase=s.turnPhase??'draw';
  knockedByIdx=s.knockedByIdx??null;mustDrawIdx=s.mustDrawIdx??-1;
  lastTurnQueue=s.lastTurnQueue??[];isFirstAction=s.isFirstAction??true;
  gameActive=s.gameActive??false;roundCount=s.roundCount??0;dealerIdx=s.dealerIdx??0;
  wasKnockedOffDeal=s.wasKnockedOffDeal??false;
  houseRuleKnockLow=s.houseRuleKnockLow??true;houseRuleTripleAces=s.houseRuleTripleAces??true;houseRuleFreeRide=s.houseRuleFreeRide??true;
  inferredSuits=s.inferredSuits??{};lastDrawSource=s.lastDrawSource??null;lastDrawnIdx=s.lastDrawnIdx??-1;
  roundSummary=s.roundSummary??null;
}

// ── STATE ROTATION ──
// rotateState: shift array so seat `offset` becomes index 0
function rotateState(s,offset,n){
  if(!offset||!n)return s;
  const rot=i=>(i===null||i<0)?i:(i-offset+n)%n;
  const newInferred={};
  for(const [k,v] of Object.entries(s.inferredSuits||{}))newInferred[rot(+k)]=v;
  return{...s,
    players:[...s.players.slice(offset),...s.players.slice(0,offset)],
    activeIdx:rot(s.activeIdx),
    knockedByIdx:s.knockedByIdx!=null?rot(s.knockedByIdx):null,
    dealerIdx:rot(s.dealerIdx),
    mustDrawIdx:s.mustDrawIdx>=0?rot(s.mustDrawIdx):s.mustDrawIdx,
    lastTurnQueue:(s.lastTurnQueue||[]).map(rot),
    inferredSuits:newInferred};
}
// unrotateState: reverse rotation (local → canonical)
function unrotateState(s,offset,n){
  if(!offset||!n)return s;
  const unrot=i=>(i===null||i<0)?i:(i+offset)%n;
  const newInferred={};
  for(const [k,v] of Object.entries(s.inferredSuits||{}))newInferred[unrot(+k)]=v;
  return{...s,
    players:[...s.players.slice(n-offset),...s.players.slice(0,n-offset)],
    activeIdx:unrot(s.activeIdx),
    knockedByIdx:s.knockedByIdx!=null?unrot(s.knockedByIdx):null,
    dealerIdx:unrot(s.dealerIdx),
    mustDrawIdx:s.mustDrawIdx>=0?unrot(s.mustDrawIdx):s.mustDrawIdx,
    lastTurnQueue:(s.lastTurnQueue||[]).map(unrot),
    inferredSuits:newInferred};
}


// ── PLAY AGAIN (same room, reset lives) ──
async function mpPlayAgain(){
  if(!mpIsHost||!isMultiplayer)return;
  // Reset all players' lives; keep seats (bots stay, humans stay)
  players.forEach(p=>{p.lives=maxLives();p.hand=[];});
  roundCount=0;
  dealerIdx=nextActive(dealerIdx%players.length); // rotate dealer for fairness
  // Push reset state so non-hosts transition automatically
  dismissPilesOverlay();
  startNewRound();
  setTimeout(pushState,400);
}
